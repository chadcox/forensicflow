version: 2
updates:
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: /apps/worker
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      # vite and its plugins share peer deps (plugin-react N requires vite N),
      # so bump them together in one PR instead of separate, un-mergeable ones.
      vite:
        patterns:
          - vite
          - "@vitejs/*"
  - package-ecosystem: docker
    directories:
      - /apps/api
      - /apps/worker
      - /apps/web
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
